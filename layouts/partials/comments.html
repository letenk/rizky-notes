{{ if .Site.Params.giscus.repoId }}
<div class="mt-12 pt-8 border-t border-gray-200 dark:border-navy-700">
  <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-6">Komentar</h3>
  <div class="giscus"></div>
</div>

<script>
(function() {
  // Read initial theme from localStorage (same logic as theme.js)
  const savedTheme = localStorage.getItem('theme');
  const giscusTheme = (savedTheme || 'dark') === 'dark' ? 'dark' : 'light';

  // Dynamically inject Giscus script so data-theme can be set from JS
  const script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.setAttribute('data-repo',              '{{ .Site.Params.giscus.repo }}');
  script.setAttribute('data-repo-id',           '{{ .Site.Params.giscus.repoId }}');
  script.setAttribute('data-category',          '{{ .Site.Params.giscus.category }}');
  script.setAttribute('data-category-id',       '{{ .Site.Params.giscus.categoryId }}');
  script.setAttribute('data-mapping',           'pathname');
  script.setAttribute('data-strict',            '1');
  script.setAttribute('data-reactions-enabled', '1');
  script.setAttribute('data-emit-metadata',     '0');
  script.setAttribute('data-input-position',    'bottom');
  script.setAttribute('data-theme',             giscusTheme);
  script.setAttribute('data-lang',              'id');
  script.setAttribute('crossorigin',            'anonymous');
  script.async = true;
  document.querySelector('.giscus').appendChild(script);

  // Sync Giscus theme when dark/light mode is toggled
  new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
      if (mutation.attributeName === 'class') {
        const isDark = document.documentElement.classList.contains('dark');
        const iframe = document.querySelector('iframe.giscus-frame');
        if (iframe) {
          iframe.contentWindow.postMessage(
            { giscus: { setConfig: { theme: isDark ? 'dark' : 'light' } } },
            'https://giscus.app'
          );
        }
      }
    });
  }).observe(document.documentElement, { attributes: true });
})();
</script>
{{ end }}
